<style>
  :root {
    --green-deep: #2D5016;
    --green-mid: #4A7C2E;
    --green-soft: #7BA05B;
    --cream: #FEFCF6;
    --cream-warm: #F5F0E8;
    --cream-deep: #EDE4D3;
    --brown: #8B6914;
    --brown-soft: #A8854C;
    --gold: #C9A84C;
    --gold-soft: #E0C77A;
    --text: #2F2A1F;
    --text-soft: #5C5240;
    --shadow: 0 10px 40px -10px rgba(74, 124, 46, 0.18);
    --shadow-sm: 0 4px 18px -6px rgba(74, 124, 46, 0.18);
    --radius: 22px;
    --radius-lg: 32px;
    --transition: cubic-bezier(.22, .9, .32, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Heebo', system-ui, -apple-system, sans-serif;
    background: var(--cream);
    color: var(--text);
    line-height: 1.7;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 12% 8%, rgba(123, 160, 91, 0.08), transparent 45%),
      radial-gradient(ellipse at 88% 90%, rgba(201, 168, 76, 0.07), transparent 45%);
    pointer-events: none;
    z-index: -1;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }

  .container {
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 22px;
  }

  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(254, 252, 246, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(74, 124, 46, 0.12);
  }
  .site-header .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 14px;
    padding-bottom: 14px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    color: var(--green-deep);
    font-size: 1.05rem;
  }
  .logo-mark {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--cream);
    display: grid;
    place-items: center;
    overflow: hidden;
    border: 2px solid rgba(74, 124, 46, 0.18);
    box-shadow: 0 4px 14px -4px rgba(45, 80, 22, 0.25);
    flex-shrink: 0;
  }
  .logo-mark img { width: 100%; height: 100%; object-fit: cover; }
  .site-nav { display: flex; align-items: center; gap: 14px; }
  .nav-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.92rem;
    color: var(--green-deep);
    border: 1px solid rgba(74, 124, 46, 0.2);
    background: var(--cream-warm);
    transition: all 0.25s var(--transition);
  }
  .nav-link:hover { background: var(--green-deep); color: var(--cream); transform: translateY(-2px); }
  .nav-cta {
    background: var(--green-deep);
    color: var(--cream);
    padding: 10px 18px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.92rem;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: all 0.25s var(--transition);
    box-shadow: 0 4px 12px -4px rgba(45, 80, 22, 0.4);
  }
  .nav-cta:hover { background: var(--green-mid); transform: translateY(-2px); }

  .page-intro {
    text-align: center;
    padding: 70px 0 30px;
  }
  .page-intro .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    background: var(--cream-warm);
    border: 1px solid rgba(139, 105, 20, 0.2);
    color: var(--brown);
    font-size: 0.85rem;
    font-weight: 600;
    border-radius: 999px;
    margin-bottom: 22px;
  }
  .page-intro .eyebrow::before { content: '📸'; }
  .page-intro h1 {
    font-size: clamp(2rem, 5vw, 3.4rem);
    font-weight: 800;
    color: var(--green-deep);
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
  }
  .page-intro p {
    color: var(--text-soft);
    max-width: 620px;
    margin: 0 auto;
    font-size: 1.05rem;
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    padding: 26px 0 40px;
  }
  .filter-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 20px;
    background: var(--cream-warm);
    color: var(--green-deep);
    border: 1.5px solid rgba(74, 124, 46, 0.2);
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 600;
    transition: all 0.25s var(--transition);
  }
  .filter-btn:hover { border-color: var(--green-deep); transform: translateY(-2px); }
  .filter-btn.active {
    background: var(--green-deep);
    color: var(--cream);
    border-color: var(--green-deep);
    box-shadow: 0 6px 16px -6px rgba(45, 80, 22, 0.4);
  }
  .filter-btn .count {
    font-size: 0.78rem;
    background: rgba(0,0,0,0.07);
    border-radius: 999px;
    padding: 2px 8px;
    font-weight: 700;
  }
  .filter-btn.active .count { background: rgba(255,255,255,0.18); }

  .gallery { padding-bottom: 90px; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }
  .gallery-item {
    position: relative;
    background: var(--cream-warm);
    border-radius: var(--radius);
    overflow: hidden;
    aspect-ratio: 4 / 5;
    cursor: zoom-in;
    border: 1px solid rgba(74, 124, 46, 0.12);
    transition: transform 0.35s var(--transition), box-shadow 0.35s var(--transition);
    opacity: 0;
    transform: translateY(14px);
    animation: fadeUp 0.5s var(--transition) forwards;
  }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  .gallery-item:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s var(--transition);
  }
  .gallery-item:hover img { transform: scale(1.05); }
  .gallery-item .tag {
    position: absolute;
    top: 12px;
    inset-inline-start: 12px;
    background: rgba(45, 80, 22, 0.85);
    color: var(--cream);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.04em;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .gallery-item.hidden { display: none; }

  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(20, 14, 6, 0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 24px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .lightbox.open { display: flex; }
  .lightbox-img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 14px;
    box-shadow: 0 20px 60px -10px rgba(0,0,0,0.6);
    object-fit: contain;
  }
  .lightbox-btn {
    position: absolute;
    color: var(--cream);
    background: rgba(254, 252, 246, 0.12);
    border: 1px solid rgba(254, 252, 246, 0.25);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 1.3rem;
    transition: background 0.2s;
  }
  .lightbox-btn:hover { background: rgba(254, 252, 246, 0.22); }
  .lightbox-close { top: 20px; inset-inline-end: 20px; }
  .lightbox-prev { top: 50%; inset-inline-start: 20px; transform: translateY(-50%); }
  .lightbox-next { top: 50%; inset-inline-end: 20px; transform: translateY(-50%); }
  .lightbox-caption {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--cream);
    background: rgba(20, 14, 6, 0.7);
    border: 1px solid rgba(254, 252, 246, 0.18);
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 0.92rem;
    max-width: 80%;
    text-align: center;
  }

  .back-home { text-align: center; padding: 30px 0 70px; }
  .back-home a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    background: var(--cream-warm);
    color: var(--green-deep);
    border: 1.5px solid rgba(74, 124, 46, 0.25);
    border-radius: 999px;
    font-weight: 700;
    transition: all 0.25s var(--transition);
  }
  .back-home a:hover { background: var(--green-deep); color: var(--cream); transform: translateY(-2px); }

  footer {
    background: linear-gradient(180deg, var(--green-deep) 0%, #1f3a0f 100%);
    color: var(--cream);
    padding: 40px 0 24px;
    text-align: center;
  }
  footer p { color: rgba(254, 252, 246, 0.8); font-size: 0.92rem; line-height: 1.8; }
  footer a { color: var(--gold-soft); font-weight: 600; }

  .float-wa {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 90;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #25D366;
    color: white;
    display: grid;
    place-items: center;
    font-size: 1.8rem;
    box-shadow: 0 8px 24px -4px rgba(18, 140, 126, 0.55);
    transition: transform 0.3s var(--transition);
  }
  .float-wa:hover { transform: scale(1.1); }

  @media (max-width: 540px) {
    .nav-link span:last-child { display: none; }
    .nav-cta span { display: none; }
    .nav-cta::after { content: '💬'; }
    .site-nav { gap: 8px; }
    .logo { font-size: 0.85rem; line-height: 1.25; gap: 8px; }
    .logo-mark { width: 40px; height: 40px; }
    .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .float-wa { width: 56px; height: 56px; font-size: 1.6rem; bottom: 20px; left: 20px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001s !important; transition-duration: 0.001s !important; }
  }
</style>
</head>

<div class="lightbox" id="lightbox" role="dialog" aria-label="תצוגת תמונה מוגדלת" aria-hidden="true">
  <button class="lightbox-btn lightbox-close" id="lbClose" aria-label="סגור">✕</button>
  <button class="lightbox-btn lightbox-prev" id="lbPrev" aria-label="הקודמת">‹</button>
  <button class="lightbox-btn lightbox-next" id="lbNext" aria-label="הבאה">›</button>
  <img class="lightbox-img" id="lbImg" alt="" />
  <div class="lightbox-caption" id="lbCaption"></div>
</div>

<script>
  const items = Array.from(document.querySelectorAll('.gallery-item'));
  const filterButtons = document.querySelectorAll('.filter-btn');
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbCaption = document.getElementById('lbCaption');
  let visibleItems = items.slice();
  let currentIndex = 0;

  // Compute counts per category dynamically
  const allCats = ['wine', 'care', 'plants', 'gifts'];
  document.querySelector('[data-count="all"]').textContent = items.length;
  allCats.forEach(cat => {
    const c = items.filter(it => it.dataset.cats.split(' ').includes(cat)).length;
    const el = document.querySelector(`[data-count="${cat}"]`);
    if (el) el.textContent = c;
  });

  items.forEach((el, i) => { el.style.animationDelay = (i * 0.03) + 's'; });

  filterButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      filterButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filter = btn.dataset.filter;
      visibleItems = [];
      items.forEach(item => {
        const cats = item.dataset.cats.split(' ');
        const match = filter === 'all' || cats.includes(filter);
        item.classList.toggle('hidden', !match);
        if (match) visibleItems.push(item);
      });
    });
  });

  items.forEach(item => {
    item.addEventListener('click', () => {
      currentIndex = visibleItems.indexOf(item);
      if (currentIndex === -1) currentIndex = 0;
      openLightbox();
    });
  });

  function openLightbox() {
    const item = visibleItems[currentIndex];
    lbImg.src = item.dataset.src;
    lbImg.alt = item.querySelector('img').alt;
    lbCaption.textContent = item.dataset.caption || '';
    lightbox.classList.add('open');
    lightbox.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    lightbox.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }
  function showNext(delta) {
    if (!visibleItems.length) return;
    currentIndex = (currentIndex + delta + visibleItems.length) % visibleItems.length;
    openLightbox();
  }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbPrev').addEventListener('click', () => showNext(-1));
  document.getElementById('lbNext').addEventListener('click', () => showNext(1));
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowLeft') showNext(1);
    else if (e.key === 'ArrowRight') showNext(-1);
  });
</script>
